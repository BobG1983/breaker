[package]
name = "brickbreaker"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = { version = "0.18.1", default-features = false, features = ["2d"] }

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[profile.release]
codegen-units = 1
lto = "thin"

[lints.rust]
missing_docs = "deny"

[lints.clippy]
# Correctness & suspicious code
all = { level = "deny", priority = -1 }
correctness = { level = "deny", priority = -1 }
suspicious = { level = "deny", priority = -1 }

# Style & complexity
pedantic = { level = "deny", priority = -1 }
nursery = { level = "warn", priority = -1 }

# Pedantic overrides — suppress noisy lints that don't add value
needless_pass_by_value = "allow"          # Bevy systems take ownership by convention
module_name_repetitions = "allow"         # BreakerState in breaker/ is fine
