# Continuous Integration for Brickbreaker
#
# Runs on pushes to develop and PRs targeting develop or main.
# Three jobs:
#   - test: fmt + clippy + tests for all workspace crates on Linux (gates scenario run)
#   - test-cross-platform: clippy + tests for all workspace crates on macOS/Windows (informational)
#   - run-scenarios: headless scenario run, gated on Linux test job
#
# Does NOT use bevy/dynamic_linking — static linking is simpler and
# avoids dylib resolution issues in CI environments.

name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop, main]

env:
  CARGO_TERM_COLOR: always
  # Disable incremental compilation — it bloats caches and is unreliable in CI.
  CARGO_INCREMENTAL: 0
  # Strip debug info from test/dev profiles to reduce cache size.
  CARGO_PROFILE_TEST_DEBUG: 0
  CARGO_PROFILE_DEV_DEBUG: 0

jobs:
  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-ubuntu-latest"
          save-if: ${{ github.ref == 'refs/heads/develop' }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint with Clippy (all workspace crates)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests (all workspace crates)
        run: cargo test --workspace

  test-cross-platform:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-${{ matrix.os }}"
          save-if: ${{ github.ref == 'refs/heads/develop' }}

      - name: Lint with Clippy (all workspace crates)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests (all workspace crates)
        run: cargo test --workspace

  run-scenarios:
    name: Run Scenarios
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libxkbcommon-dev

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-scenarios"
          save-if: ${{ github.ref == 'refs/heads/develop' }}

      - name: Run scenarios
        run: cargo run --release -p breaker_scenario_runner -- --all
